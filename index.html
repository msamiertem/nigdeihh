              } catch(e) {

              }
          };

              } catch(e) {
                  showNotification("Veriler tarayıcıya kaydedilemedi!", "error");
              }
          };

          useEffect(() => {
            const initAuth = () => {
              if (shouldUseLocalStorage) {
                  // Yerel moddaysa login ekranını göstermek için yüklemeyi bitiriyoruz.
                  setLoading(false);
                  return;
              }

              // Firebase Auth State Listener
              if (auth) {
                  const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    if (u) {
                        setIsAuthenticated(true);
                    } else {
                        setIsAuthenticated(false);
                    }
                    setLoading(false);
                  });
                  return () => unsubscribe();
              }
            };
            initAuth();
          }, []);

          useEffect(() => {
            if (shouldUseLocalStorage) {
                const localData = loadFromLocalStorage();
                setRecords(localData);
                return;
            }

            if (!user || !db) return;

                return { ...prev, cocukSayisi: val, cocuklar: newChildren };

                const match = records.find(r => (r.tc === val || r.esTc === val) && r.id !== editingId);
                if (match) { setDuplicateRecord(match); setDuplicateReason('spouse'); }
            }
          };

            setFilters(prev => ({
              ...prev,
              [name]: value,
              ...(name === 'ilce' ? { mahalle: "" } : {})
            }));
          };

          const clearFilters = () => {

                ilce: "", mahalle: "", maddiDurum: "", evKiraMi: "", 
                medeniHal: "", calismaDurumu: "", yetimAilesi: "", 
                minGelir: "", maxGelir: "", minIhtiyac: "", maxIhtiyac: "", aldigiYardim: "", yaptigimizYardim: "",
                uyruk: ""
            });
            setSearchTerm("");
          };

          const showNotification = (msg, type = 'success') => {
            setNotification({ msg, type });
            setTimeout(() => setNotification(null), 3000);
          };

          // YENİ Firebase Email/Şifre Giriş Metodu
          const handleLogin = async (e) => {
            e.preventDefault();
            setLoginError('');
            
            if (shouldUseLocalStorage) {
                // Eğer Firebase yoksa ve Yerel Moddaysa, direkt giriş yap.
                if (loginCredentials.email) {
                    setIsAuthenticated(true);
                    setUser({ uid: "local-user" });
                } else {
                    setLoginError('Lütfen giriş yapmak için e-posta giriniz.');
                }
                return;
            }

            try {
                setLoading(true);
                await signInWithEmailAndPassword(auth, loginCredentials.email, loginCredentials.password);
                // Başarılı olduğunda onAuthStateChanged devreye girip isAuthenticated'ı true yapacak
            } catch (error) {
                setLoading(false);
                console.error("Giriş hatası:", error);
                if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                    setLoginError('E-posta adresi veya şifre hatalı!');
                } else if (error.code === 'auth/invalid-email') {
                    setLoginError('Geçersiz bir e-posta adresi girdiniz.');
                } else {
                    setLoginError('Giriş yapılamadı: ' + error.message);
                }
            }
          };

          const handleLogout = async () => {
            if (shouldUseLocalStorage) {
                setIsAuthenticated(false);
                setUser(null);
                setLoginCredentials({ email: '', password: '' });
            } else {
                try {
                    await signOut(auth);
                    setLoginCredentials({ email: '', password: '' });
                } catch (error) {
                    console.error("Çıkış hatası:", error);
                }
            }
          };

          // --- EXCEL IMPORT/EXPORT İŞLEMLERİ ---

          const downloadExcel = () => {
            const dataToExport = records.map(r => ({
                ...r,
                cocuklar: JSON.stringify(r.cocuklar || []) 
            }));
            
            const worksheet = XLSX.utils.json_to_sheet(dataToExport);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "YardimKayitlari");
            XLSX.writeFile(workbook, `ihh_yardim_listesi_${new Date().toLocaleDateString('tr-TR')}.xlsx`);
          };

          const handleFileUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            setLoading(true); 

            const reader = new FileReader();
            reader.onload = (evt) => {
                try {
                    const bstr = evt.target.result;
                    const wb = XLSX.read(bstr, { type: 'binary' });
                    const wsname = wb.SheetNames[0];
                    const ws = wb.Sheets[wsname];
                    const data = XLSX.utils.sheet_to_json(ws);

                    const processedData = data.map(item => {
                        let parsedChildren = [];
                        try {
                            if (item.cocuklar && typeof item.cocuklar === 'string') {
                                parsedChildren = JSON.parse(item.cocuklar);
                            }
                        } catch (err) {
                            console.warn("Çocuk verisi ayrıştırılamadı:", err);
                        }
                        
                        const { id, ...rest } = item; 
                        
                        return {
                            ...initialFormState,
                            ...rest,
                            cocuklar: parsedChildren,
                            kisiSayisi: Number(item.kisiSayisi) || 1,
                            calisanSayisi: Number(item.calisanSayisi) || 0,
                            cocukSayisi: Number(item.cocukSayisi) || 0,
                            aylikGelir: Number(item.aylikGelir) || 0,
                            kira: Number(item.kira) || 0,
                            ihtiyacDerecesi: Number(item.ihtiyacDerecesi) || 5
                        };
                    });

                    const existingTcs = new Set();
                    records.forEach(r => {
                        if (r.tc && r.tc.trim() !== "") existingTcs.add(r.tc.trim());
                        if (r.esTc && r.esTc.trim() !== "") existingTcs.add(r.esTc.trim());
                    });

                    const validData = [];
                    let duplicateCount = 0;

                    processedData.forEach(item => {
                        const itemTc = item.tc ? String(item.tc).trim() : "";
                        const itemEsTc = item.esTc ? String(item.esTc).trim() : "";

                        const isDupe = (itemTc && existingTcs.has(itemTc)) || (itemEsTc && existingTcs.has(itemEsTc));

                        if (isDupe) {
                            duplicateCount++; 
                        } else {
                            validData.push(item);
                            if (itemTc) existingTcs.add(itemTc);
                            if (itemEsTc) existingTcs.add(itemEsTc);
                        }
                    });

                    if (validData.length > 0) {
                        importRecords(validData, duplicateCount);
                    } else if (duplicateCount > 0) {
                        showNotification(`Tüm kayıtlar (${duplicateCount} adet) mükerrer TC nedeniyle aktarılamadı!`, 'warning');
                        setLoading(false);
                    } else {
                        showNotification("İçe aktarılacak geçerli veri bulunamadı.", "error");
                        setLoading(false);
                    }
                } catch (error) {
                    console.error("Excel okuma hatası:", error);
                    showNotification("Dosya okunamadı. Formatın doğru olduğundan emin olun.", "error");
                    setLoading(false);
                }
            };
            reader.readAsBinaryString(file);
            e.target.value = null; 
          };

          const importRecords = async (newData, duplicateCount = 0) => {
            setLoading(true);
            let successCount = 0;
            
            try {
                if (shouldUseLocalStorage) {
                    let currentRecords = loadFromLocalStorage();
                    const newRecordsWithIds = newData.map(r => ({
                        ...r,
                        id: "local_imp_" + Date.now() + Math.random().toString(36).substr(2, 9),
                        timestamp: Date.now()
                    }));
                    const updatedRecords = [...newRecordsWithIds, ...currentRecords];
                    saveToLocalStorage(updatedRecords);
                    successCount = newData.length;

                    if (!user) return;

                            ...record,
                            timestamp: Date.now()
                        });
                        successCount++;

                let type = 'success';

                    msg += ` (${duplicateCount} mükerrer kayıt atlandı)`;

                console.error("İçe aktarma hatası:", e);

            } finally {
                setLoading(false);
            }

              if (existingRecord) { setDuplicateRecord(existingRecord); setDuplicateReason('main'); return; }
            }
            if (formData.medeniHal === 'Evli' && formData.esTc && formData.esTc.trim() !== "") {
                const existingSpouseRecord = records.find(r => (r.tc === formData.esTc || r.esTc === formData.esTc) && r.id !== editingId);
                if (existingSpouseRecord) { setDuplicateRecord(existingSpouseRecord); setDuplicateReason('spouse'); return; }
            }
            const cleanFormData = { ...formData };
            if (cleanFormData.evKiraMi === 'Hayır') { cleanFormData.kira = 0; } else { cleanFormData.evKiraDegilseNeden = ""; }
            if (cleanFormData.medeniHal !== 'Evli') { cleanFormData.esAdSoyad = ""; cleanFormData.esTc = ""; }

                  if (editingId) {
                    await updateDoc(doc(db, 'yardim_kayitlari', editingId), cleanFormData);

                    const newRecord = { ...cleanFormData, kayitTarihi: new Date().toLocaleDateString('tr-TR'), timestamp: Date.now() };

                    showNotification("Kayıt başarıyla eklendi!");

              setActiveTab('list');

              showNotification("Bir hata oluştu: " + error.message, 'error');

            if (!editData.hesapAdi) editData.hesapAdi = "";

              const svgString = `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" xmlns="http://www.w3.org/2000/svg">${SVG_CONTENT}</svg>`;
              const img = new Image();
              img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgString);
              img.onload = () => {
                const canvas = document.createElement('canvas');
                const targetWidth = 400; 
                const targetHeight = targetWidth / (width / height);

                canvas.height = targetHeight;
                const ctx = canvas.getContext('2d');

                let aValue = a[sortConfig.key];
                let bValue = b[sortConfig.key];
                if (sortConfig.key === 'kayitTarihi') { aValue = a.timestamp || 0; bValue = b.timestamp || 0; }

                if (aValue < bValue) return sortConfig.direction === 'ascending' ? -1 : 1;
                if (aValue > bValue) return sortConfig.direction === 'ascending' ? 1 : -1;
                return 0;
              });
            }
            return sortableItems;

                        <div className="space-y-1"><label className="text-sm font-medium text-gray-700">Çalışma Durumu</label><select name="calismaDurumu" value={formData.calismaDurumu} onChange={handleInputChange} className="w-full border border-gray-300 rounded-lg p-2.5 bg-white focus:ring-2 focus:ring-emerald-500 outline-none transition"><option value="">Seçiniz...</option><option value="Çalışmıyor">Çalışmıyor</option><option value="Düzenli İş">Düzenli İş</option><option value="Gündelik İş">Gündelik İş</option><option value="Emekli">Emekli</option></select></div>
                        <div className="space-y-1"><label className="text-sm font-medium text-gray-700">Aylık Toplam Gelir (TL)</label><input type="number" name="aylikGelir" value={formData.aylikGelir} onChange={handleInputChange} className="w-full border border-gray-300 rounded-lg p-2.5 bg-yellow-50 focus:bg-white focus:ring-2 focus:ring-emerald-500 outline-none transition" /></div>
                        
                        {/* YENİ EKLENEN KISIM: İHTİYAÇ DERECESİ */}
                        <div className="space-y-1 bg-emerald-50/50 p-2 rounded-lg border border-emerald-100">
                          <label className="text-sm font-bold text-emerald-800 flex justify-between items-center">
                              <span>İhtiyaç Derecesi (1-10)</span>
                              <span className="bg-emerald-600 text-white rounded-full w-6 h-6 flex items-center justify-center text-xs">{formData.ihtiyacDerecesi || 5}</span>
                          </label>
                          <input type="range" name="ihtiyacDerecesi" min="1" max="10" step="1" value={formData.ihtiyacDerecesi || 5} onChange={handleInputChange} className="w-full" />
                          <div className="flex justify-between text-xs text-gray-400 px-1">
                              <span>Düşük</span>
                              <span>Orta</span>
                              <span>Çok Acil</span>
                          </div>
                        </div>

                        <div className="space-y-1"><label className="text-sm font-medium text-gray-700">Ev Kira mı?</label><select name="evKiraMi" value={formData.evKiraMi} onChange={handleInputChange} className="w-full border border-gray-300 rounded-lg p-2.5 bg-white focus:ring-2 focus:ring-emerald-500 outline-none transition"><option value="">Seçiniz...</option><option value="Evet">Evet</option><option value="Hayır">Hayır</option></select></div>
                        {formData.evKiraMi === 'Evet' && (<div className="space-y-1"><label className="text-sm font-medium text-gray-700">Kira Tutarı (TL)</label><input type="number" name="kira" value={formData.kira} onChange={handleInputChange} className="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-emerald-500 outline-none transition" /></div>)} 
                        {formData.evKiraMi === 'Hayır' && (<div className="space-y-1"><label className="text-sm font-medium text-gray-700">Ev Kimin / Neden Kira Değil?</label><input type="text" name="evKiraDegilseNeden" value={formData.evKiraDegilseNeden} onChange={handleInputChange} className="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-emerald-500 outline-none transition" placeholder="Örn: Kendi Evi, Baba Evi, Lojman..." /></div>)}
                        <div className="col-span-full bg-gray-50 p-4 rounded-xl border border-gray-200"><h4 className="font-semibold text-sm text-gray-600 mb-3 flex items-center gap-2"><Filter size={16} /> Diğer Kurumlardan Alınan Yardımlar</h4><div className="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4">{AID_TYPES.map((aid) => (<div key={aid.key} className={`bg-white p-3 rounded-lg border shadow-sm transition-all ${formData[aid.key] === 'Var' ? 'border-emerald-300 ring-1 ring-emerald-100' : 'border-gray-200'}`}><div className="flex justify-between items-center mb-2"><label className="text-sm font-bold text-gray-700">{aid.label}</label><select name={aid.key} value={formData[aid.key]} onChange={handleInputChange} className={`border rounded p-1 text-sm w-24 outline-none ${formData[aid.key] === 'Var' ? 'bg-emerald-100 text-emerald-800 font-bold border-emerald-300' : 'bg-gray-50'}`}><option value="Yok">Yok</option><option value="Var">Var</option></select></div>{formData[aid.key] === 'Var' && (<input type="text" name={aid.key + 'Aciklama'} value={formData[aid.key + 'Aciklama']} onChange={handleInputChange} placeholder="Yardım detayı nedir?" className="w-full text-xs border-b border-gray-300 focus:border-emerald-500 outline-none py-1 bg-transparent"/>)}</div>))}</div></div>
                        <div className="col-span-full mt-4"><h3 className="text-lg font-semibold text-gray-700 border-b pb-2 mb-4 flex items-center gap-2"><span className="bg-emerald-100 text-emerald-800 rounded px-2 py-0.5 text-sm font-bold">4</span> Adres Bilgileri</h3></div>
                        <div className="space-y-1"><label className="text-sm font-medium text-gray-700">İlçe</label><select name="ilce" value={formData.ilce} onChange={handleInputChange} className="w-full border border-gray-300 rounded-lg p-2.5 bg-white focus:ring-2 focus:ring-emerald-500 outline-none transition">{Object.keys(NIGDE_DATA).map(ilce => (<option key={ilce} value={ilce}>{ilce}</option>))}</select></div>
                        <div className="space-y-1"><label className="text-sm font-medium text-gray-700">Mahalle / Köy</label><select name="mahalle" value={formData.mahalle} onChange={handleInputChange} className="w-full border border-gray-300 rounded-lg p-2.5 bg-white focus:ring-2 focus:ring-emerald-500 outline-none transition"><option value="">Seçiniz...</option>{NIGDE_DATA[formData.ilce]?.map(mahalle => (<option key={mahalle} value={mahalle}>{mahalle}</option>))}</select></div>
                        <div className="col-span-full space-y-1"><label className="text-sm font-medium text-gray-700">Adres Detayı (Sokak, Bina No, Daire No)</label><textarea name="adresDetay" value={formData.adresDetay} onChange={handleInputChange} className="w-full border border-gray-300 rounded-lg p-2.5 h-20 focus:ring-2 focus:ring-emerald-500 outline-none transition resize-none" placeholder="Örn: Karanfil Sokak, Huzur Apt. No: 5/3" /></div>
                        <div className="col-span-full mt-4"><h3 className="text-lg font-semibold text-gray-700 border-b pb-2 mb-4 flex items-center gap-2"><span className="bg-emerald-100 text-emerald-800 rounded px-2 py-0.5 text-sm font-bold">5</span> İBAN Bilgileri</h3></div>
                        <div className="col-span-full grid grid-cols-1 md:grid-cols-3 gap-4 bg-gray-50 p-4 rounded-xl border border-gray-200">
                             <div className="space-y-1"><label className="text-sm font-medium text-gray-700 flex items-center gap-1"><CreditCard size={14} /> Hesap Sahibi</label><input type="text" name="hesapAdi" value={formData.hesapAdi} onChange={handleInputChange} className="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-emerald-500 outline-none transition" placeholder="Ad Soyad"/></div>
                             <div className="space-y-1"><label className="text-sm font-medium text-gray-700">Banka Adı</label><input type="text" name="bankaAdi" value={formData.bankaAdi} onChange={handleInputChange} className="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-emerald-500 outline-none transition" placeholder="Örn: Ziraat Bankası"/></div>
                             <div className="space-y-1"><label className="text-sm font-medium text-gray-700">IBAN Numarası</label><input type="text" name="iban" value={formData.iban} onChange={handleInputChange} className="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-emerald-500 outline-none transition font-mono" placeholder="TR..."/></div>
                        </div>
                        <div className="col-span-full mt-4"><h3 className="text-lg font-semibold text-emerald-800 border-b border-emerald-200 pb-2 mb-4 flex items-center gap-2"><span className="bg-emerald-600 text-white rounded px-2 py-0.5 text-sm font-bold">6</span> Yapılan Yardımlar (Kurum İçi)</h3></div>
                        <div className="col-span-full bg-emerald-50/50 p-4 rounded-xl border border-emerald-100"><div className="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4">{PROVIDED_AID_TYPES.map((aid) => (<div key={aid.key} className={`bg-white p-3 rounded-lg border shadow-sm transition-all ${formData[aid.key] === 'Var' ? 'border-emerald-500 ring-1 ring-emerald-200' : 'border-emerald-100'}`}><div className="flex justify-between items-center mb-2"><label className="text-sm font-bold text-gray-700 flex items-center gap-2"><Gift size={14} className="text-emerald-600" />{aid.label}</label><select name={aid.key} value={formData[aid.key]} onChange={handleInputChange} className={`border rounded p-1 text-sm w-24 outline-none cursor-pointer ${formData[aid.key] === 'Var' ? 'bg-emerald-600 text-white font-bold border-emerald-600' : 'bg-gray-50 text-gray-600'}`}><option value="Yok">Yok</option><option value="Var">Var</option></select></div>{formData[aid.key] === 'Var' && (<input type="text" name={aid.key + 'Aciklama'} value={formData[aid.key + 'Aciklama']} onChange={handleInputChange} placeholder="Miktar / Detay giriniz..." className="w-full text-sm border-b border-gray-300 focus:border-emerald-500 outline-none py-1.5 bg-transparent placeholder-gray-400"/>)}</div>))}</div></div>
                        <div className="col-span-full space-y-1 mt-4"><label className="text-sm font-medium text-gray-700">Notlar</label><textarea name="notlar" value={formData.notlar} onChange={handleInputChange} className="w-full border border-gray-300 rounded-lg p-2.5 h-20 focus:ring-2 focus:ring-emerald-500 outline-none transition resize-none" placeholder="Özel durumlar, gözlemler vb." /></div>
                        <div className="col-span-full pt-4 flex gap-4">
                            <button type="submit" className="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-6 rounded-lg transition flex items-center justify-center gap-2"><Save size={20} /> {editingId ? 'Değişiklikleri Kaydet' : 'Kaydı Tamamla'}</button>
                            {editingId && (<button type="button" onClick={() => { resetForm(); setActiveTab('list'); }} className="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-6 rounded-lg transition">Vazgeç</button>)}
                            {!editingId && (<button type="button" onClick={resetForm} className="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-6 rounded-lg transition">Temizle</button>)}
                        </div>
                      </div>
                    </form>
                  </div>
                )}
                {activeTab === 'list' && (
                  <div className="space-y-4">
                    <div className="bg-white p-4 rounded-xl shadow border border-gray-100 space-y-4">
                       <div className="flex flex-col md:flex-row justify-between items-center gap-4">
                         <div className="relative w-full md:flex-1">
                           <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" size={20} />
                           <input type="text" placeholder="Hızlı Arama: İsim, Soyisim veya TC..." className="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                         </div>
                         <div className="flex gap-2 w-full md:w-auto">
                            <input 
                                type="file" 
                                accept=".xlsx, .xls" 
                                ref={fileInputRef} 
                                className="hidden" 
                                onChange={handleFileUpload} 
                            />
                            <button onClick={() => setShowFilters(!showFilters)} className={`flex-1 md:flex-none flex items-center justify-center gap-2 px-4 py-2 rounded-lg transition font-medium border ${showFilters ? 'bg-emerald-100 border-emerald-300 text-emerald-800' : 'bg-gray-50 border-gray-300 text-gray-700 hover:bg-gray-100'}`}><ListFilter size={18} /> Detaylı Arama</button>
                            <button onClick={() => fileInputRef.current.click()} className="flex-1 md:flex-none flex items-center justify-center gap-2 bg-blue-100 text-blue-800 px-4 py-2 rounded-lg hover:bg-blue-200 transition font-medium"><Upload size={18} /> İçe Aktar</button>
                            <button onClick={downloadExcel} className="flex-1 md:flex-none flex items-center justify-center gap-2 bg-emerald-100 text-emerald-800 px-4 py-2 rounded-lg hover:bg-emerald-200 transition font-medium"><FileSpreadsheet size={18} /> Dışa Aktar</button>
                         </div>
                       </div>
                       {showFilters && (
                         <div className="pt-4 border-t border-gray-100 grid grid-cols-1 md:grid-cols-4 lg:grid-cols-5 gap-4 animate-in fade-in slide-in-from-top-2 bg-gray-50/50 p-4 rounded-lg">
                           <div><label className="text-xs font-bold text-gray-500 mb-1 block">İlçe</label><select value={filters.ilce} onChange={(e) => handleFilterChange('ilce', e.target.value)} className="w-full border rounded p-2 text-sm"><option value="">Tümü</option>{Object.keys(NIGDE_DATA).map(ilce => <option key={ilce} value={ilce}>{ilce}</option>)}</select></div>
                           <div><label className="text-xs font-bold text-gray-500 mb-1 block">Mahalle</label><select value={filters.mahalle} onChange={(e) => handleFilterChange('mahalle', e.target.value)} className="w-full border rounded p-2 text-sm" disabled={!filters.ilce}><option value="">Tümü</option>{filters.ilce && NIGDE_DATA[filters.ilce]?.map(mah => <option key={mah} value={mah}>{mah}</option>)}</select></div>
                           <div><label className="text-xs font-bold text-gray-500 mb-1 block">Uyruğu</label><select value={filters.uyruk} onChange={(e) => handleFilterChange('uyruk', e.target.value)} className="w-full border rounded p-2 text-sm"><option value="">Tümü</option><option value="TC">T.C.</option><option value="Filistin">Filistin</option><option value="Suriye">Suriye</option><option value="Afganistan">Afganistan</option><option value="Irak">Irak</option><option value="Iran">İran</option><option value="Diger">Diğer</option></select></div>
                           <div><label className="text-xs font-bold text-gray-500 mb-1 block">Medeni Hal</label><select value={filters.medeniHal} onChange={(e) => handleFilterChange('medeniHal', e.target.value)} className="w-full border rounded p-2 text-sm"><option value="">Tümü</option><option value="Evli">Evli</option><option value="Bekar">Bekar</option><option value="Dul">Dul</option><option value="Boşanmış">Boşanmış</option></select></div>
                           <div><label className="text-xs font-bold text-gray-500 mb-1 block">Çalışma Durumu</label><select value={filters.calismaDurumu} onChange={(e) => handleFilterChange('calismaDurumu', e.target.value)} className="w-full border rounded p-2 text-sm"><option value="">Tümü</option><option value="Çalışmıyor">Çalışmıyor</option><option value="Düzenli İş">Düzenli İş</option><option value="Gündelik İş">Gündelik İş</option><option value="Emekli">Emekli</option></select></div>
                           <div><label className="text-xs font-bold text-gray-500 mb-1 block">Maddi Durum</label><select value={filters.maddiDurum} onChange={(e) => handleFilterChange('maddiDurum', e.target.value)} className="w-full border rounded p-2 text-sm"><option value="">Tümü</option><option value="Çok Kötü">Çok Kötü</option><option value="Kötü">Kötü</option><option value="Orta">Orta</option><option value="İyi">İyi</option></select></div>
                           
                           <div className="col-span-1 md:col-span-2 grid grid-cols-2 gap-2">
                               <div><label className="text-xs font-bold text-gray-500 mb-1 block">Min. Gelir</label><input type="number" value={filters.minGelir} onChange={(e) => handleFilterChange('minGelir', e.target.value)} className="w-full border rounded p-2 text-sm" placeholder="0" /></div>
                               <div><label className="text-xs font-bold text-gray-500 mb-1 block">Max. Gelir</label><input type="number" value={filters.maxGelir} onChange={(e) => handleFilterChange('maxGelir', e.target.value)} className="w-full border rounded p-2 text-sm" placeholder="∞" /></div>
                           </div>

                           <div className="col-span-1 md:col-span-2 grid grid-cols-2 gap-2">
                               <div><label className="text-xs font-bold text-gray-500 mb-1 block">Min. İhtiyaç Puanı</label><input type="number" value={filters.minIhtiyac} onChange={(e) => handleFilterChange('minIhtiyac', e.target.value)} className="w-full border rounded p-2 text-sm" placeholder="1" min="1" max="10" /></div>
                               <div><label className="text-xs font-bold text-gray-500 mb-1 block">Max. İhtiyaç Puanı</label><input type="number" value={filters.maxIhtiyac} onChange={(e) => handleFilterChange('maxIhtiyac', e.target.value)} className="w-full border rounded p-2 text-sm" placeholder="10" min="1" max="10" /></div>
                           </div>

                           <div><label className="text-xs font-bold text-gray-500 mb-1 block">Yetim Ailesi</label><select value={filters.yetimAilesi} onChange={(e) => handleFilterChange('yetimAilesi', e.target.value)} className="w-full border rounded p-2 text-sm"><option value="">Tümü</option><option value="Evet">Evet</option><option value="Hayır">Hayır</option></select></div>
                           <div><label className="text-xs font-bold text-gray-500 mb-1 block">Ev Kira mı?</label><select value={filters.evKiraMi} onChange={(e) => handleFilterChange('evKiraMi', e.target.value)} className="w-full border rounded p-2 text-sm"><option value="">Tümü</option><option value="Evet">Evet</option><option value="Hayır">Hayır</option></select></div>
                           
                           <div><label className="text-xs font-bold text-emerald-600 mb-1 block">Kurum İçi Yardım</label><select value={filters.yaptigimizYardim} onChange={(e) => handleFilterChange('yaptigimizYardim', e.target.value)} className="w-full border border-emerald-300 rounded p-2 text-sm bg-emerald-50"><option value="">Tümü</option>{PROVIDED_AID_TYPES.map(a => <option key={a.key} value={a.key}>{a.label} Alanlar</option>)}</select></div>
                           <div><label className="text-xs font-bold text-blue-600 mb-1 block">Kurum Dışı Yardım</label><select value={filters.aldigiYardim} onChange={(e) => handleFilterChange('aldigiYardim', e.target.value)} className="w-full border border-blue-300 rounded p-2 text-sm bg-blue-50"><option value="">Tümü</option>{AID_TYPES.map(a => <option key={a.key} value={a.key}>{a.label} Alanlar</option>)}</select></div>

                           <div className="col-span-1 md:col-span-5 flex justify-end"><button onClick={clearFilters} className="text-red-600 text-sm hover:underline flex items-center gap-1"><X size={14} /> Filtreleri Temizle</button></div>
                         </div>
                       )}
                    </div>
                    <div className="bg-white rounded-xl shadow border border-gray-100 overflow-hidden">
                       <div className="overflow-x-auto">
                         <table className="w-full text-sm text-left">
                           <thead className="bg-gray-50 text-gray-700 font-bold border-b border-gray-200">
                             <tr>
                                <th onClick={() => requestSort('ad')} className="px-4 py-3 cursor-pointer hover:bg-gray-100 transition"><div className="flex items-center gap-1">Ad Soyad <SortIcon colKey="ad"/></div></th>
                                <th onClick={() => requestSort('tc')} className="px-4 py-3 cursor-pointer hover:bg-gray-100 transition"><div className="flex items-center gap-1">TC No <SortIcon colKey="tc"/></div></th>
                                <th onClick={() => requestSort('ilce')} className="px-4 py-3 cursor-pointer hover:bg-gray-100 transition"><div className="flex items-center gap-1">Bölge <SortIcon colKey="ilce"/></div></th>
                                <th onClick={() => requestSort('ihtiyacDerecesi')} className="px-4 py-3 cursor-pointer hover:bg-gray-100 transition"><div className="flex items-center gap-1">Puan <SortIcon colKey="ihtiyacDerecesi"/></div></th>
                                <th onClick={() => requestSort('kayitTarihi')} className="px-4 py-3 cursor-pointer hover:bg-gray-100 transition"><div className="flex items-center gap-1">Kayıt Tarihi <SortIcon colKey="kayitTarihi"/></div></th>
                                <th className="px-4 py-3 text-center">İşlemler</th>
                             </tr>
                           </thead>
                           <tbody className="divide-y divide-gray-100">
                             {sortedAndFilteredRecords.length > 0 ? (
                               sortedAndFilteredRecords.map((record) => (
                                 <tr key={record.id} className="hover:bg-emerald-50/50 transition">
                                   <td className="px-4 py-3 font-medium text-gray-900">{record.ad} {record.soyad}</td>
                                   <td className="px-4 py-3 text-gray-500">{record.tc || '-'}</td>
                                   <td className="px-4 py-3 text-gray-500">{record.mahalle ? `${record.mahalle}, ` : ''}{record.ilce}</td>
                                   <td className="px-4 py-3">
                                      <div className="flex items-center gap-2" title={`İhtiyaç Puanı: ${record.ihtiyacDerecesi || 5}/10`}>
                                        <span className={`text-xs font-bold w-5 h-5 flex items-center justify-center rounded-full ${
                                            (record.ihtiyacDerecesi || 5) >= 8 ? 'bg-red-100 text-red-700' :
                                            (record.ihtiyacDerecesi || 5) >= 5 ? 'bg-orange-100 text-orange-700' :
                                            'bg-green-100 text-green-700'
                                        }`}>
                                            {record.ihtiyacDerecesi || 5}
                                        </span>
                                        <div className="w-16 h-1.5 bg-gray-200 rounded-full overflow-hidden">
                                            <div 
                                                className={`h-full ${(record.ihtiyacDerecesi || 5) >= 8 ? 'bg-red-500' : (record.ihtiyacDerecesi || 5) >= 5 ? 'bg-orange-400' : 'bg-emerald-500'}`} 
                                                style={{ width: `${(record.ihtiyacDerecesi || 5) * 10}%` }}
                                            ></div>
                                        </div>
                                      </div>
                                   </td>
                                   <td className="px-4 py-3 text-gray-500 text-xs">
                                     <div className="flex items-center gap-1">
                                       <Calendar size={12}/> {record.kayitTarihi}
                                     </div>
                                   </td>
                                   <td className="px-4 py-3">
                                     <div className="flex items-center justify-center gap-2">
                                       <button onClick={() => downloadIndividualWord(record)} title="Word Çıktısı Al" className="p-1.5 text-blue-600 hover:bg-blue-50 rounded-lg transition">
                                         <FileText size={18} />
                                       </button>
                                       <button onClick={() => handleEdit(record)} title="Düzenle" className="p-1.5 text-emerald-600 hover:bg-emerald-50 rounded-lg transition">
                                         <Edit size={18} />
                                       </button>
                                       <button onClick={() => setDeleteConfirm(record.id)} title="Sil" className="p-1.5 text-red-600 hover:bg-red-50 rounded-lg transition">
                                         <Trash2 size={18} />
                                       </button>
                                     </div>
                                   </td>
                                 </tr>
                               ))
                             ) : (
                               <tr>
                                 <td colSpan="6" className="px-4 py-8 text-center text-gray-500">
                                   {searchTerm || filters.ilce || filters.maddiDurum || filters.medeniHal ? 'Arama kriterlerine uygun kayıt bulunamadı.' : 'Henüz hiç kayıt eklenmemiş.'}
                                 </td>
                               </tr>
                             )}
                           </tbody>
                         </table>
                       </div>
                       <div className="bg-gray-50 px-4 py-3 border-t border-gray-200 text-xs text-gray-500 flex justify-between items-center">
                         <span>Toplam {records.length} kayıt</span>
                         <span className="font-medium text-emerald-700">
                           {sortedAndFilteredRecords.length !== records.length 
                             ? `${sortedAndFilteredRecords.length} kayıt filtrelendi` 
                             : 'Tüm kayıtlar görüntüleniyor'}
                         </span>
                       </div>
                    </div>
                  </div>
                )}
              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
