        function App() {

          const [selectedForMerge, setSelectedForMerge] = useState(new Set());
          const [importStats, setImportStats] = useState(null);

          const handleTabClick = (targetTab) => {

              }
              setActiveTab(targetTab);
          };

          const [isAuthenticated, setIsAuthenticated] = useState(false);

          const [loginError, setLoginError] = useState('');
          const [dbError, setDbError] = useState(false);
          const [permissionError, setPermissionError] = useState(false);

          const [showFilters, setShowFilters] = useState(false);

          });

          const [currentStep, setCurrentStep] = useState(1);

          const totalSteps = 6;
          const stepTitles = [
              "Kimlik", "Sağlık", "Ekonomi", "Adres", "İBAN", "Notlar"
          ];

          useEffect(() => {
            const initAuth = async () => {
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  try {
                    await signInWithCustomToken(auth, __initial_auth_token);
                  } catch (tokenError) {
                    await signInAnonymously(auth);
                  }
                } else {
                  await signInAnonymously(auth);
                }
              } catch (error) {
                setLoading(false);
              }
            };
            initAuth();
            if (auth) {
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }
          }, []);

          useEffect(() => {
            if (!user || !db) {
                setLoading(false);
                return;
            }
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'yardim_kayitlari'));
            const unsubscribe = onSnapshot(q, (snapshot) => {
              const firestoreData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
              setRecords(firestoreData.reverse());
              setLoading(false);
              setDbError(false);
              setPermissionError(false);
            }, (error) => {
              setLoading(false); 
              if (error.code === 'not-found' || error.message.includes('not exist') || error.message.includes('not-found')) {
                  setDbError(true);
              } else if (error.code === 'permission-denied' || error.message.includes('insufficient permissions')) {
                  setPermissionError(true);
              }
            });
            return () => unsubscribe();
          }, [user]);

            setFormData(prev => {

                    if (!editingId && (!prev.hesapAdi || prev.hesapAdi === `${prev.ad} ${prev.soyad}`.trim())) {
                          newState.hesapAdi = `${newState.ad} ${newState.soyad}`.trim();
                    }
                }
                return newState;
            });
            
            if (errors[name]) setErrors(prev => ({ ...prev, [name]: null }));
          };

          const handleChildCountChange = (e) => {
            const val = e.target.value;
            const count = val === '' ? 0 : parseInt(val);
            if (count < 0 || count > 20) return; 
            setFormData(prev => {
                const currentChildren = prev.cocuklar || [];
                let newChildren = [...currentChildren];
                if (count > currentChildren.length) {
                    for (let i = 0; i < count - currentChildren.length; i++) newChildren.push({ ad: '', dogumTarihi: '', cinsiyet: '', ogrenimDurumu: '' });
                } else if (count < currentChildren.length) {
                    newChildren = newChildren.slice(0, count);
                }
                return { ...prev, cocukSayisi: val, cocuklar: newChildren };
            });
          };

          const handleChildChange = (index, field, value) => {
            setFormData(prev => {
                const updatedChildren = [...prev.cocuklar];
                updatedChildren[index] = { ...updatedChildren[index], [field]: value };
                return { ...prev, cocuklar: updatedChildren };
            });
            const errKey = `cocuk_${field}_${index}`;
            if (errors[errKey]) setErrors(prev => ({ ...prev, [errKey]: null }));
          };

          const handleEsTcBlur = (e) => {
            const val = e.target.value;
            if (val && val.length === 11) {
                const match = records.find(r => (r.tc === val || r.esTc === val) && r.id !== editingId);
                if (match) { setDuplicateRecord(match); setDuplicateReason('spouse'); }
            }
          };

          const handleFilterChange = (name, value) => {
            setFilters(prev => ({ ...prev, [name]: value, ...(name === 'ilce' ? { mahalle: "" } : {}) }));
          };

          const clearFilters = () => {
            setFilters({ ilce: "", mahalle: "", maddiDurum: "", evKiraMi: "", medeniHal: "", calismaDurumu: "", yetimAilesi: "", minGelir: "", maxGelir: "", minIhtiyac: "", maxIhtiyac: "", aldigiYardim: "", yaptigimizYardim: "", uyruk: "" });
            setSearchTerm("");
          };

          const handleLogin = async (e) => {
            e.preventDefault();
            setLoginError('');
            try {
              let loginEmail = loginCredentials.username;
              if (loginEmail && !loginEmail.includes('@')) {
                  loginEmail += '@nigdeihh.com';
              }
              await signInWithEmailAndPassword(auth, loginEmail, loginCredentials.password);
              setIsAuthenticated(true);
            } catch (error) {
              setLoginError('Kullanıcı adı veya şifre hatalı!');
              console.error("Giriş Hatası: ", error.code);
            }
          };

          const handleLogout = async () => {
            try {
              await signOut(auth);
              setIsAuthenticated(false);
              setLoginCredentials({ username: '', password: '' });
              await signInAnonymously(auth);
            } catch (error) {
              console.error("Çıkış hatası:", error);
            }
          };

          const downloadExcel = () => {
            const dataToExport = records.map(r => ({ ...r, cocuklar: JSON.stringify(r.cocuklar || []) }));
            const worksheet = XLSX.utils.json_to_sheet(dataToExport);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "YardimKayitlari");
            XLSX.writeFile(workbook, `ihh_yardim_listesi_${new Date().toLocaleDateString('tr-TR')}.xlsx`);
          };

          const handleFileUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (evt) => {
                try {
                    const bstr = evt.target.result;
                    const wb = XLSX.read(bstr, { type: 'binary' });
                    const wsname = wb.SheetNames[0];
                    const ws = wb.Sheets[wsname];
                    const data = XLSX.utils.sheet_to_json(ws);

                    const existingTcsMap = new Map();
                    records.forEach(r => {
                        if(r.tc) existingTcsMap.set(String(r.tc).trim(), r);
                    });

                    const uniqueData = [];
                    const duplicateData = [];

                    const processedData = data.map(item => {
                        let parsedChildren = [];
                        try { if (item.cocuklar && typeof item.cocuklar === 'string') { parsedChildren = JSON.parse(item.cocuklar); } } catch (err) {}
                        const { id, ...rest } = item; 
                        return {
                            ...initialFormState, ...rest, cocuklar: parsedChildren,
                            kisiSayisi: Number(item.kisiSayisi) || 1, calisanSayisi: Number(item.calisanSayisi) || 0,
                            cocukSayisi: Number(item.cocukSayisi) || 0, aylikGelir: Number(item.aylikGelir) || 0,
                            kira: Number(item.kira) || 0, ihtiyacDerecesi: Number(item.ihtiyacDerecesi) || 5
                        };
                    });

                    for (const row of processedData) {
                        const tcStr = row.tc ? String(row.tc).trim() : '';
                        if (tcStr && existingTcsMap.has(tcStr)) {
                            duplicateData.push({ excelRecord: row, existingRecord: existingTcsMap.get(tcStr) });
                        } else {
                            uniqueData.push(row);
                        }
                    }

                    if (duplicateData.length > 0) {
                        setPendingImport({ uniqueData, duplicateData });
                        setSelectedForMerge(new Set(duplicateData.map((_, i) => i)));
                    } else if (uniqueData.length > 0) {
                        executeImport(uniqueData, [], new Set());
                    } else {
                        if (fileInputRef.current) fileInputRef.current.value = null; 
                    }
                } catch (error) {
                    console.error("Dosya okunamadı. Formatın doğru olduğundan emin olun.", error);
                    if (fileInputRef.current) fileInputRef.current.value = null;
                }
            };
            reader.readAsBinaryString(file);
          };

          const executeImport = async (uniqueList, duplicateList, mergeSet) => {
            setLoading(true);
            setPendingImport(null);
            let addedCount = 0;
            let mergedCount = 0;

            try {
                if (!user) return;

                for (const record of uniqueList) {
                    const newRecordData = { ...record, timestamp: Date.now() };
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'yardim_kayitlari'), newRecordData);
                    addedCount++;
                }

                for (let i = 0; i < duplicateList.length; i++) {
                    const { excelRecord, existingRecord } = duplicateList[i];
                    if (mergeSet.has(i)) {
                        const updateData = { ...excelRecord, timestamp: Date.now() };
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'yardim_kayitlari', existingRecord.id), updateData);
                        mergedCount++;
                    } else {
                        const newRecordData = { ...excelRecord, timestamp: Date.now() };
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'yardim_kayitlari'), newRecordData);
                        addedCount++;
                    }
                }

                setImportStats({ added: addedCount, merged: mergedCount });
            } catch (e) {
                if (e.code === 'permission-denied') setPermissionError(true);
                console.error("Aktarım hatası:", e);
            } finally {
                setLoading(false);
                if (fileInputRef.current) fileInputRef.current.value = null;
            }

          const validateStep = (step) => {
            const requirements = {
                1: [{ key: 'ad', label: 'Adı' }, { key: 'soyad', label: 'Soyadı' }, { key: 'tc', label: 'TC Kimlik No' }],
                2: [],
                3: [],
                4: [],
                5: [],
                6: []
            };

            let stepErrors = {};
            const req = requirements[step] || [];

            for (let field of req) {
                const val = formData[field.key];
                if (val === "" || val === null || val === undefined || String(val).trim() === "") {
                    stepErrors[field.key] = `${field.label} alanı zorunludur.`;
                } else if (field.key === 'tc' && String(val).length !== 11) {
                    stepErrors[field.key] = "TC Kimlik Numarası 11 haneli olmalıdır.";
                }
            }

            if (step === 1) {
                if (formData.medeniHal === 'Evli' && formData.esTc && formData.esTc.trim() !== "") {
                    if (String(formData.esTc).length !== 11) { stepErrors.esTc = "Eş TC Kimlik Numarası 11 haneli olmalıdır."; }
                }
            }

            if (Object.keys(stepErrors).length > 0) {
                setErrors(stepErrors);
                return false;
            }

            if (step === 1) {
                if (formData.tc && formData.tc.trim() !== "") {
                  const existingRecord = records.find(r => (r.tc === formData.tc || r.esTc === formData.tc) && r.id !== editingId);
                  if (existingRecord) { setDuplicateRecord(existingRecord); setDuplicateReason('main'); return false; }
                }
                if (formData.medeniHal === 'Evli' && formData.esTc && formData.esTc.trim() !== "") {
                    const existingSpouseRecord = records.find(r => (r.tc === formData.esTc || r.esTc === formData.esTc) && r.id !== editingId);
                    if (existingSpouseRecord) { setDuplicateRecord(existingSpouseRecord); setDuplicateReason('spouse'); return false; }
                }
            }
            
            setErrors({}); 
            return true;
          };

          const handleNextStep = () => {
              setErrors({}); 
              setCurrentStep(prev => Math.min(prev + 1, totalSteps));
              window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          const handlePrevStep = () => {
              setCurrentStep(prev => Math.max(prev - 1, 1));
              setErrors({}); 
              window.scrollTo({ top: 0, behavior: 'smooth' });
          };

                if (aValue < bValue) return sortConfig.direction === 'ascending' ? -1 : 1;
                if (aValue > bValue) return sortConfig.direction === 'ascending' ? 1 : -1;
                return 0;
              });

            return sortableItems;

                                   <td className="px-5 py-4 text-gray-600 font-medium">{record.mahalle ? `${record.mahalle}, ` : ''}{record.ilce}</td>
                                   <td className="px-5 py-4">
                                      <div className="flex items-center gap-3" title={`İhtiyaç Puanı: ${record.ihtiyacDerecesi || 5}/10`}>
                                        <span className={`text-xs font-bold w-6 h-6 flex items-center justify-center rounded-full shadow-sm ${
                                            (record.ihtiyacDerecesi || 5) >= 8 ? 'bg-red-500 text-white' :
                                            (record.ihtiyacDerecesi || 5) >= 5 ? 'bg-orange-400 text-white' :
                                            'bg-emerald-500 text-white'
                                        }`}>
                                            {record.ihtiyacDerecesi || 5}
                                        </span>
                                        <div className="w-16 h-1.5 bg-gray-200 rounded-full overflow-hidden">
                                            <div 
                                                className={`h-full transition-all duration-500 ${(record.ihtiyacDerecesi || 5) >= 8 ? 'bg-red-500' : (record.ihtiyacDerecesi || 5) >= 5 ? 'bg-orange-400' : 'bg-emerald-500'}`} 
                                                style={{ width: `${(record.ihtiyacDerecesi || 5) * 10}%` }}
                                            ></div>
                                        </div>
                                      </div>
                                   </td>
                                   <td className="px-5 py-4 text-gray-500 text-xs font-medium">
                                     <div className="flex items-center gap-1.5">
                                       <Calendar size={14} className="text-gray-400"/> {record.kayitTarihi}
                                     </div>
                                   </td>
                                   <td className="px-5 py-4">
                                     <div className="flex items-center justify-center gap-2">
                                       <button onClick={() => downloadIndividualWord(record)} title="Word Çıktısı Al" className="p-2 bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white rounded-lg transition"><FileText size={18} /></button>
                                       <button onClick={() => handleEdit(record)} title="Düzenle" className="p-2 bg-emerald-50 text-emerald-600 hover:bg-emerald-600 hover:text-white rounded-lg transition"><Edit size={18} /></button>
                                       <button onClick={() => setDeleteConfirm(record.id)} title="Sil" className="p-2 bg-red-50 text-red-600 hover:bg-red-600 hover:text-white rounded-lg transition"><Trash2 size={18} /></button>
                                     </div>
                                   </td>
                                 </tr>
                               ))
                             ) : (
                               <tr>
                                 <td colSpan="6" className="px-5 py-12 text-center">
                                    <div className="flex flex-col items-center justify-center text-gray-400">
                                        <Search size={32} className="mb-3 opacity-50" />
                                        <p className="text-sm font-medium">{searchTerm || filters.ilce || filters.maddiDurum || filters.medeniHal ? 'Arama kriterlerine uygun kayıt bulunamadı.' : 'Sistemde henüz hiç kayıt bulunmuyor.'}</p>
                                    </div>
                                 </td>
                               </tr>
                             )}
                           </tbody>
                         </table>
                       </div>
                       <div className="bg-gray-50 px-5 py-4 border-t border-gray-200 text-xs font-bold text-gray-500 flex justify-between items-center uppercase tracking-wide">
                         <span>Toplam {records.length} Kayıt</span>
                         <span className="text-emerald-700">
                           {sortedAndFilteredRecords.length !== records.length ? `${sortedAndFilteredRecords.length} Sonuç Filtrelendi` : 'Tüm Kayıtlar Gösteriliyor'}
                         </span>
                       </div>
                    </div>
                  </div>
                )}
              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
